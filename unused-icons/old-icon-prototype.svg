<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="skyToSea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5CB8FF"/>
      <stop offset="100%" stop-color="#1A6AE3"/>
    </linearGradient>
  </defs>

  <!-- Carabiner body: asymmetric D-shape, straight left spine, curved right -->
  <path
    d="
      M 200 90
      C 160 90, 130 120, 130 160
      L 130 360
      C 130 410, 170 440, 220 440
      L 280 440
      C 370 440, 420 380, 420 290
      C 420 200, 390 140, 330 110
    "
    fill="none"
    stroke="url(#skyToSea)"
    stroke-width="50"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Gate: short segment on upper right, slightly open with upward curl -->
  <path
    d="
      M 305 100
      C 330 108, 355 130, 360 150
    "
    fill="none"
    stroke="url(#skyToSea)"
    stroke-width="50"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Spring/hinge dot at gate pivot -->
  <circle cx="310" cy="92" r="7" fill="url(#skyToSea)" opacity="0.4"/>
</svg>
