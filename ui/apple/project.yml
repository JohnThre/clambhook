name: Clambhook
options:
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  ClambhookShared:
    path: .
configFiles:
  Debug: Signing.local.xcconfig
  Release: Signing.local.xcconfig
settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: NO
    ENABLE_HARDENED_RUNTIME: YES
targets:
  ClambhookMac:
    type: application
    platform: macOS
    sources:
      - path: SharedApp
      - path: ClambhookMac
      - path: ../../bin/clambhook
        buildPhase:
          copyFiles:
            destination: executables
      - path: ../../bin/libsodium.26.dylib
        buildPhase:
          copyFiles:
            destination: frameworks
    dependencies:
      - package: ClambhookShared
      - target: ClambhookMacWidgetExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clambhook.mac
        INFOPLIST_FILE: ClambhookMac/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClambhookMac/ClambhookMac.entitlements
        ENABLE_APP_SANDBOX: YES
  ClambhookiOS:
    type: application
    platform: iOS
    sources:
      - path: SharedApp
      - path: ClambhookiOS
    dependencies:
      - package: ClambhookShared
      - target: ClambhookiOSWidgetExtension
        embed: true
      - target: ClambhookiOSPacketTunnel
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.jpfchang.clambhook.ios
        INFOPLIST_FILE: ClambhookiOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClambhookiOS/ClambhookiOS.entitlements
  ClambhookiOSPacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: ClambhookiOSPacketTunnel
    dependencies:
      - package: ClambhookShared
    preBuildScripts:
      - name: Build TunnelCore XCFramework
        script: |
          "${PROJECT_DIR}/scripts/build-tunnelcore-xcframework.sh"
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.jpfchang.clambhook.ios.packet-tunnel
        INFOPLIST_FILE: ClambhookiOSPacketTunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClambhookiOSPacketTunnel/ClambhookiOSPacketTunnel.entitlements
        HEADER_SEARCH_PATHS: "$(inherited) $(DERIVED_FILE_DIR)/tunnelcore/headers"
        LIBRARY_SEARCH_PATHS: "$(inherited) $(DERIVED_FILE_DIR)/tunnelcore/link"
        OTHER_LDFLAGS: "$(inherited) -lClambhookTunnelCore"
        SWIFT_INCLUDE_PATHS: "$(inherited) $(DERIVED_FILE_DIR)/tunnelcore/headers"
        SKIP_INSTALL: YES
  ClambhookMacWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: ClambhookWidgets
    dependencies:
      - package: ClambhookShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clambhook.mac.widgets
        INFOPLIST_FILE: ClambhookWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClambhookWidgets/ClambhookMacWidgetExtension.entitlements
        ENABLE_APP_SANDBOX: YES
        SKIP_INSTALL: YES
  ClambhookiOSWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ClambhookWidgets
    dependencies:
      - package: ClambhookShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.jpfchang.clambhook.ios.widgets
        INFOPLIST_FILE: ClambhookWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClambhookWidgets/ClambhookiOSWidgetExtension.entitlements
        SKIP_INSTALL: YES
