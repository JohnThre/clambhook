name: Clambhook
options:
  deploymentTarget:
    macOS: "14.0"
    visionOS: "26.0"
  createIntermediateGroups: true
packages:
  ClambhookShared:
    path: .
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ARCHS: arm64
    "EXCLUDED_ARCHS[sdk=macosx*]": "x86_64 i386"
    ONLY_ACTIVE_ARCH: NO
    ENABLE_HARDENED_RUNTIME: YES
targets:
  ClambhookMac:
    type: application
    platform: macOS
    sources:
      - path: SharedApp
      - path: ClambhookMac
      - path: ../../bin/clambhook
        buildPhase:
          copyFiles:
            destination: executables
      - path: ../../bin/libsodium.26.dylib
        buildPhase:
          copyFiles:
            destination: frameworks
    dependencies:
      - package: ClambhookShared
      - framework: Frameworks/ClambhookMobile.xcframework
      - sdk: NetworkExtension.framework
      - sdk: SystemExtensions.framework
      - target: ClambhookMacTunnel
        embed: true
      - target: ClambhookMacWidgetExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clambhook.mac
        INFOPLIST_FILE: ClambhookMac/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClambhookMac/ClambhookMac.entitlements
        ENABLE_APP_SANDBOX: YES
  ClambhookMacTunnel:
    type: system-extension
    platform: macOS
    sources:
      - path: ClambhookMacTunnel
    dependencies:
      - package: ClambhookShared
      - framework: Frameworks/ClambhookMobile.xcframework
      - sdk: NetworkExtension.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clambhook.mac.tunnel
        INFOPLIST_FILE: ClambhookMacTunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClambhookMacTunnel/ClambhookMacTunnel.entitlements
        ENABLE_APP_SANDBOX: YES
        SKIP_INSTALL: YES
  ClambhookVision:
    type: application
    platform: visionOS
    sources:
      - path: SharedApp
      - path: ClambhookVision
    dependencies:
      - package: ClambhookShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clambhook.vision
        INFOPLIST_FILE: ClambhookVision/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClambhookVision/ClambhookVision.entitlements
        SUPPORTED_PLATFORMS: xros xrsimulator
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
  ClambhookMacWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: ClambhookWidgets
    dependencies:
      - package: ClambhookShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clambhook.mac.widgets
        INFOPLIST_FILE: ClambhookWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClambhookWidgets/ClambhookMacWidgetExtension.entitlements
        ENABLE_APP_SANDBOX: YES
        SKIP_INSTALL: YES
