name: Clambhook
options:
  deploymentTarget:
    macOS: "26.0"
    iOS: "26.0"
    tvOS: "26.0"
    visionOS: "26.0"
  createIntermediateGroups: true
packages:
  ClambhookShared:
    path: .
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: NO
    ENABLE_HARDENED_RUNTIME: YES
targets:
  ClambhookMac:
    type: application
    platform: macOS
    sources:
      - path: SharedApp
      - path: ClambhookMac
      - path: ../../bin/clambhook
        buildPhase:
          copyFiles:
            destination: executables
      - path: ../../bin/libsodium.26.dylib
        buildPhase:
          copyFiles:
            destination: frameworks
    dependencies:
      - package: ClambhookShared
      - target: ClambhookMacWidgetExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clambhook.mac
        INFOPLIST_FILE: ClambhookMac/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClambhookMac/ClambhookMac.entitlements
        ENABLE_APP_SANDBOX: YES
  ClambhookiOS:
    type: application
    platform: iOS
    scheme:
      storeKitConfiguration: ClambhookProducts.storekit
    sources:
      - path: Assets.xcassets
      - path: ClambhookProducts.storekit
        buildPhase: none
      - path: SharedApp
      - path: ClambhookiOS
    dependencies:
      - target: ClambhookPacketTunnel
        embed: true
      - package: ClambhookShared
      - framework: Frameworks/ClambhookMobile.xcframework
        embed: false
      - target: ClambhookiOSWidgetExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.jpfchang.clambhook
        INFOPLIST_FILE: ClambhookiOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClambhookiOS/ClambhookiOS.entitlements
        FRAMEWORK_SEARCH_PATHS: "$(PROJECT_DIR)/Frameworks $(PROJECT_DIR)/Frameworks/**"
        TARGETED_DEVICE_FAMILY: "1,2"
  ClambhookTV:
    type: application
    platform: tvOS
    sources:
      - path: SharedApp
      - path: ClambhookTV
    dependencies:
      - package: ClambhookShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clambhook.tv
        INFOPLIST_FILE: ClambhookTV/Info.plist
  ClambhookVision:
    type: application
    platform: visionOS
    sources:
      - path: SharedApp
      - path: ClambhookVision
    dependencies:
      - package: ClambhookShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clambhook.vision
        INFOPLIST_FILE: ClambhookVision/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClambhookVision/ClambhookVision.entitlements
        SUPPORTED_PLATFORMS: xros xrsimulator
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
  ClambhookPacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: ClambhookPacketTunnel
    dependencies:
      - package: ClambhookShared
      - framework: Frameworks/ClambhookMobile.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.jpfchang.clambhook.tunnel
        INFOPLIST_FILE: ClambhookPacketTunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClambhookPacketTunnel/ClambhookPacketTunnel.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
        FRAMEWORK_SEARCH_PATHS: "$(PROJECT_DIR)/Frameworks $(PROJECT_DIR)/Frameworks/**"
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: YES
  ClambhookMacWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: ClambhookWidgets
    dependencies:
      - package: ClambhookShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clambhook.mac.widgets
        INFOPLIST_FILE: ClambhookWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClambhookWidgets/ClambhookMacWidgetExtension.entitlements
        ENABLE_APP_SANDBOX: YES
        SKIP_INSTALL: YES
  ClambhookiOSWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ClambhookWidgets
    dependencies:
      - package: ClambhookShared
      - framework: Frameworks/ClambhookMobile.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.jpfchang.clambhook.widgets
        INFOPLIST_FILE: ClambhookWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClambhookWidgets/ClambhookiOSWidgetExtension.entitlements
        FRAMEWORK_SEARCH_PATHS: "$(PROJECT_DIR)/Frameworks $(PROJECT_DIR)/Frameworks/**"
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: YES
