name: Clambhook
options:
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  ClambhookShared:
    path: .
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
targets:
  ClambhookMac:
    type: application
    platform: macOS
    sources:
      - path: SharedApp
      - path: ClambhookMac
      - path: ../../bin/clambhook
        buildPhase: resources
    dependencies:
      - package: ClambhookShared
      - target: ClambhookMacWidgetExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clambhook.mac
        INFOPLIST_FILE: ClambhookMac/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClambhookMac/ClambhookMac.entitlements
  ClambhookiOS:
    type: application
    platform: iOS
    sources:
      - path: SharedApp
      - path: ClambhookiOS
    dependencies:
      - package: ClambhookShared
      - target: ClambhookiOSWidgetExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clambhook.ios
        INFOPLIST_FILE: ClambhookiOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClambhookiOS/ClambhookiOS.entitlements
  ClambhookMacWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: ClambhookWidgets
    dependencies:
      - package: ClambhookShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clambhook.mac.widgets
        INFOPLIST_FILE: ClambhookWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClambhookWidgets/ClambhookMacWidgetExtension.entitlements
        SKIP_INSTALL: YES
  ClambhookiOSWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ClambhookWidgets
    dependencies:
      - package: ClambhookShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clambhook.ios.widgets
        INFOPLIST_FILE: ClambhookWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClambhookWidgets/ClambhookiOSWidgetExtension.entitlements
        SKIP_INSTALL: YES
