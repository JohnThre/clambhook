name: Clambhook
options:
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  ClambhookShared:
    path: .
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.3"
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: V6GG4HYABJ
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: Apple Development
    ARCHS: arm64
    "EXCLUDED_ARCHS[sdk=macosx*]": "x86_64 i386"
    ONLY_ACTIVE_ARCH: NO
    ENABLE_HARDENED_RUNTIME: YES
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  ClambhookMac:
    type: application
    platform: macOS
    sources:
      - path: SharedApp
      - path: SharedPrivilegedHelper
      - path: ClambhookMac
      - path: Assets.xcassets
      - path: ../../bin/clambhook
        buildPhase:
          copyFiles:
            destination: executables
      - path: ../../bin/clambhook-tui
        buildPhase:
          copyFiles:
            destination: executables
      - path: ../../bin/libsodium.26.dylib
        buildPhase:
          copyFiles:
            destination: frameworks
    dependencies:
      - package: ClambhookShared
      - package: Sparkle
      - sdk: ServiceManagement.framework
      - target: ClambhookMacWidgetExtension
        embed: true
      - target: ClambhookMacHelper
        link: false
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.jpfchang.clambhook.mac
        INFOPLIST_FILE: ClambhookMac/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClambhookMac/ClambhookMac.entitlements
        ENABLE_APP_SANDBOX: NO
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    postCompileScripts:
      - name: Embed Privileged Helper
        script: |
          set -euo pipefail
          helper_source="${BUILT_PRODUCTS_DIR}/ClambhookMacHelper"
          helper_dest="${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Library/HelperTools/ClambhookMacHelper"
          plist_source="${SRCROOT}/ClambhookMacHelper/org.jpfchang.clambhook.mac.helper.plist"
          plist_dest="${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Library/LaunchDaemons/org.jpfchang.clambhook.mac.helper.plist"
          if [[ ! -x "$helper_source" ]]; then
              echo "missing helper executable at $helper_source" >&2
              exit 1
          fi
          install -d "$(dirname "$helper_dest")" "$(dirname "$plist_dest")"
          install -m 0755 "$helper_source" "$helper_dest"
          install -m 0644 "$plist_source" "$plist_dest"
        inputFiles:
          - $(BUILT_PRODUCTS_DIR)/ClambhookMacHelper
          - $(SRCROOT)/ClambhookMacHelper/org.jpfchang.clambhook.mac.helper.plist
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Library/HelperTools/ClambhookMacHelper
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Library/LaunchDaemons/org.jpfchang.clambhook.mac.helper.plist
  ClambhookMacHelper:
    type: tool
    platform: macOS
    sources:
      - path: SharedPrivilegedHelper
      - path: ClambhookMacHelper
        excludes:
          - ClambhookMacHelper.entitlements
          - org.jpfchang.clambhook.mac.helper.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.jpfchang.clambhook.mac.helper
        CODE_SIGN_ENTITLEMENTS: ClambhookMacHelper/ClambhookMacHelper.entitlements
        ENABLE_APP_SANDBOX: NO
        SKIP_INSTALL: YES
  ClambhookMacWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: ClambhookWidgets
    dependencies:
      - package: ClambhookShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.jpfchang.clambhook.mac.widgets
        INFOPLIST_FILE: ClambhookWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClambhookWidgets/ClambhookMacWidgetExtension.entitlements
        ENABLE_APP_SANDBOX: YES
        SKIP_INSTALL: YES
schemes:
  ClambhookMac:
    build:
      targets:
        ClambhookMac: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
