app-id: com.clambhook.Clambhook
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang
command: clambhook-linux
finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --talk-name=org.freedesktop.secrets
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/pkgconfig
modules:
  - name: clambhook
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
      append-path: /usr/lib/sdk/golang/bin
      env:
        GOROOT: /usr/lib/sdk/golang
        GOCACHE: /run/build/clambhook/.gocache/go-build
        GOMODCACHE: /run/build/clambhook/.gocache/pkg/mod
    build-commands:
      - mkdir -p flatpak-daemon
      - CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o flatpak-daemon/clambhook ./cmd/clambhook
      - meson setup flatpak-build ui/linux --prefix=/app --buildtype=release -Dclambhook_daemon="$(pwd)/flatpak-daemon/clambhook"
      - meson compile -C flatpak-build
      - meson install -C flatpak-build
    sources:
      - type: dir
        path: ../..
        skip:
          - .git
          - bin
          - dist
          - docs/superpowers
          - ui/apple/.build
          - ui/android/.gradle
          - ui/android/build
          - ui/android/app/build
          - ui/linux/builddir
          - ui/linux/flatpak-build
          - ui/windows/**/bin
          - ui/windows/**/obj
