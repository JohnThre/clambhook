# clambhook configuration example

# Active profile name (supports emoji)
active = "🇺🇸 US Fast"

# Optional: IP → country/city lookups for server display. Point `database`
# at an MMDB file (MaxMind GeoLite2 City/Country, DB-IP, or IPinfo).
# Relative paths resolve against this config file's directory. Omit the
# section to disable — the daemon runs fine without a geo database.
# [geo]
# database = "GeoLite2-City.mmdb"

# Optional: local metadata-only traffic history for the native apps and TUI.
# clambhook stores recent connection targets, rates, totals, timings, listener
# and chain metadata, and hop status. Packet payloads are never stored.
# Omit `history_path` to use the OS user cache directory.
# [traffic]
# enabled = true
# history_limit = 500
# history_max_age = "168h"
# history_path = "traffic-history.json"

[[profile]]
name = "🇺🇸 US Fast"

  [profile.listen]
  socks5 = "127.0.0.1:1080"
  http   = "127.0.0.1:8080"
  # socks5_chain selects which chain the SOCKS5 listener routes through.
  # Omit to use the first chain defined below.
  # socks5_chain = "default"
  # socks5_max_connections caps concurrent in-flight handlers. Omit or set
  # to 0 for the built-in default (512). New clients block until a slot frees.
  # socks5_max_connections = 512
  # socks5_handshake_timeout bounds how long a client has to complete the
  # SOCKS5 greeting + auth + request before the listener disconnects it.
  # Accepts any Go duration ("30s", "2m"). Default 30s. Cleared before relay,
  # so long-lived tunnels are unaffected.
  # socks5_handshake_timeout = "30s"

  # HTTP proxy listener options mirror their SOCKS5 siblings. Both CONNECT
  # (HTTPS tunnels) and plain-HTTP forward requests are accepted; one
  # request per connection (keep-alive is disabled so each request gets a
  # fresh chain dial).
  # http_chain = "default"
  # http_max_connections = 512
  # http_handshake_timeout = "30s"

  # Optional RFC 1929 username/password auth for the SOCKS5 listener.
  # Presence of this table switches the listener to require credentials.
  # [profile.listen.socks5_auth]
  # username = "alice"
  # password = "hunter2"

  # Optional RFC 7617 Basic auth for the HTTP proxy listener. Credentials
  # are sent in the Proxy-Authorization header; missing or wrong creds
  # return 407 Proxy Authentication Required.
  # [profile.listen.http_auth]
  # username = "alice"
  # password = "hunter2"

  # Optional Linux-only device-wide TUN mode. This changes host routes and
  # requires running the daemon as root or with CAP_NET_ADMIN. It captures
  # routed device TCP/UDP traffic, sends it through the selected chain, and
  # reports metadata + byte counts only; packet payloads are not stored.
  #
  # The chain used by TUN must support UDP, otherwise startup fails clearly.
  #
  # [profile.listen.tun]
  # enabled = false
  # name = "clambhook0"
  # chain = "default"
  # mtu = 1500
  # addresses = ["198.18.0.1/30", "fd7a:636c:616d::1/64"]
  # routes = ["0.0.0.0/1", "128.0.0.0/1"] # optional; defaults to split IPv4 plus IPv6 when available
  # exclude_cidrs = ["192.168.0.0/16", "10.0.0.0/8"]

  [profile.api]
  listen = "127.0.0.1:9090"

  [[profile.chain]]
  name = "default"

    [[profile.chain.server]]
    name     = "us-east-1"
    address  = "us1.example.com:443"
    protocol = "trojan"

      [profile.chain.server.settings]
      password = "your-password-here"
      sni      = "example.com"

[[profile]]
name = "Clambback"

  [profile.listen]
  socks5 = "127.0.0.1:1080"

  [profile.api]
  listen = "127.0.0.1:9090"

  [[profile.chain]]
  name = "clambback"

    [[profile.chain.server]]
    name     = "clambback-server"
    address  = "clambback.example.com:443"
    protocol = "clambback"

      [profile.chain.server.settings]
      password = "your-password-here"
      sni = "clambback.example.com"
      # skip_cert_verify = true # only for private/self-signed test servers

[[profile]]
name = "🔒 Double Hop"

  [profile.listen]
  socks5 = "127.0.0.1:1080"

  [profile.api]
  listen = "127.0.0.1:9090"

  [[profile.chain]]
  name = "chain-eu-us"

    [[profile.chain.server]]
    name     = "eu-entry"
    address  = "eu.example.com:443"
    protocol = "trojan"

      [profile.chain.server.settings]
      password = "pass1"

    [[profile.chain.server]]
    name     = "us-exit"
    address  = "us.example.com:443"
    protocol = "shadowsocks"

      [profile.chain.server.settings]
      method   = "aes-256-gcm"
      password = "pass2"

[[profile]]
name = "🛰️ VLESS"

  [profile.listen]
  socks5 = "127.0.0.1:1080"

  [profile.api]
  listen = "127.0.0.1:9090"

  # VLESS is plaintext — all confidentiality comes from the TLS wrapper
  # beneath it. `uuid` is required; `flow` is restricted to "none" in this
  # build (no xtls-rprx-vision / xudp).
  [[profile.chain]]
  name = "vless-only"

    [[profile.chain.server]]
    name     = "vless-us"
    address  = "vless.example.com:443"
    protocol = "vless"

      [profile.chain.server.settings]
      uuid = "REPLACE-WITH-USER-UUID-0000-000000000000"
      sni  = "vless.example.com"
      # alpn = ["h2", "http/1.1"]
      # skip_cert_verify = false   # never set true in production

[[profile]]
name = "🎭 VLESS + Reality"

  [profile.listen]
  socks5 = "127.0.0.1:1080"

  [profile.api]
  listen = "127.0.0.1:9090"

  # Reality is an anti-censorship TLS handshake: clambhook emits a
  # ClientHello indistinguishable from a real browser visiting
  # `server_name` (the decoy site the Reality server fronts), and proves
  # itself to the server through an X25519-authenticated session_id.
  # Probes and DPI see normal HTTPS to a popular site.
  #
  # `public_key` is the server's static X25519 pub, in hex (64 chars) or
  # unpadded base64-url (43 chars). `short_id` is hex, ≤ 8 bytes.
  # `fingerprint` chooses the browser shape: chrome/firefox/safari/
  # ios/android/edge/360/qq (default chrome). `server_name` must be the
  # SNI of the decoy site the server is configured to forward to.
  [[profile.chain]]
  name = "vless-reality"

    [[profile.chain.server]]
    name     = "vless-reality-us"
    address  = "reality.example.com:443"
    protocol = "vless"

      [profile.chain.server.settings]
      uuid     = "REPLACE-WITH-USER-UUID-0000-000000000000"
      security = "reality"

        [profile.chain.server.settings.reality]
        server_name = "www.microsoft.com"
        fingerprint = "chrome"
        public_key  = "REPLACE_WITH_SERVER_X25519_PUBLIC_KEY"
        short_id    = "a1b2c3d4"

[[profile]]
name = "📮 VMess"

  [profile.listen]
  socks5 = "127.0.0.1:1080"

  [profile.api]
  listen = "127.0.0.1:9090"

  # VMess AEAD. Legacy alter_id>0 and plaintext security modes are rejected.
  # `security` selects the body AEAD: aes-128-gcm (default) or
  # chacha20-poly1305. TLS is on by default; set tls=false only for local
  # loopback testing.
  [[profile.chain]]
  name = "vmess-only"

    [[profile.chain.server]]
    name     = "vmess-eu"
    address  = "vmess.example.com:443"
    protocol = "vmess"

      [profile.chain.server.settings]
      uuid     = "REPLACE-WITH-USER-UUID-0000-000000000000"
      security = "aes-128-gcm"       # or "chacha20-poly1305"
      # packet_encoding = "xudp"      # enables per-datagram UDP destinations
      sni      = "vmess.example.com"
      # tls = true
      # alpn = ["h2", "http/1.1"]

[[profile]]
name = "🛡️ WireGuard"

  [profile.listen]
  socks5 = "127.0.0.1:1080"

  [profile.api]
  listen = "127.0.0.1:9090"

  # WireGuard must be a single-hop chain: it can't tunnel inside another
  # stream protocol, because its UDP-bound transport needs raw datagrams.
  # Place it as the chain's only hop. The top-level `address` and the
  # peer's `endpoint` must match (or `address` may be omitted entirely).
  # Hostnames in `endpoint` are resolved at startup via the OS resolver
  # — by design, since the endpoint sits *outside* the tunnel.
  [[profile.chain]]
  name = "wg-only"

    [[profile.chain.server]]
    name     = "wg-example"
    address  = "wg.example.com:51820"
    protocol = "wireguard"

      [profile.chain.server.settings]
      private_key = "REPLACE_WITH_BASE64_PRIVATE_KEY="
      addresses   = ["10.0.0.2/32"]    # interior IP(s) on the WG NIC
      dns         = ["1.1.1.1"]        # optional, used for in-tunnel DNS
      mtu         = 1420               # optional, default 1420
      log_level   = "error"            # silent | error | verbose

        [[profile.chain.server.settings.peers]]
        public_key           = "REPLACE_WITH_BASE64_PEER_PUBLIC_KEY="
        endpoint             = "wg.example.com:51820"
        allowed_ips          = ["0.0.0.0/0", "::/0"]
        # preshared_key      = "REPLACE_WITH_BASE64_PSK="   # optional
        persistent_keepalive = 25

[[profile]]
name = "🧅 Tor"

  [profile.listen]
  socks5 = "127.0.0.1:1080"

  [profile.api]
  listen = "127.0.0.1:9090"

  # clambhook does not implement onion routing itself — it speaks SOCKS5 to a
  # locally-running tor daemon (e.g. `brew install tor && tor`). Point
  # `address` at tor's SOCKS5 port (default 127.0.0.1:9050).
  #
  # .onion hostnames work transparently: the address is sent to tor as a
  # domain, so tor resolves it inside its own circuit — no DNS leaks.
  [[profile.chain]]
  name = "tor-only"

    [[profile.chain.server]]
    name     = "tor-local"
    address  = "127.0.0.1:9050"
    protocol = "tor"

      [profile.chain.server.settings]
      # Optional stream-isolation credentials. Tor doesn't authenticate
      # these — it uses unique pairs as tokens, giving each pair its own
      # circuit. Leave both unset to share a circuit across flows.
      # isolation_user = "clambhook"
      # isolation_pass = "profile-1"

[[profile]]
name = "🔐 OpenVPN"

  [profile.listen]
  socks5 = "127.0.0.1:1080"

  [profile.api]
  listen = "127.0.0.1:9090"

  # OpenVPN, like WireGuard, is an L3 VPN — it can't tunnel inside another
  # stream protocol, so the chain must be single-hop with OpenVPN at the
  # top. Only UDP transport is supported; TLS 1.2+ with tls-ekm is required
  # (OpenVPN 2.6+ servers by default). tls-auth / tls-crypt / tls-crypt-v2
  # and CBC data-channel ciphers are not supported in this pass.
  [[profile.chain]]
  name = "ovpn-only"

    [[profile.chain.server]]
    name     = "ovpn-example"
    address  = "vpn.example.com:1194"
    protocol = "openvpn"

      [profile.chain.server.settings]
      # PEM blocks are inlined (consistent with how WireGuard inlines its
      # private_key). Triple-quoted TOML strings preserve newlines.
      ca_cert = """-----BEGIN CERTIFICATE-----
REPLACE_WITH_SERVER_CA_PEM
-----END CERTIFICATE-----"""
      client_cert = """-----BEGIN CERTIFICATE-----
REPLACE_WITH_CLIENT_CERT_PEM
-----END CERTIFICATE-----"""
      client_key = """-----BEGIN PRIVATE KEY-----
REPLACE_WITH_CLIENT_KEY_PEM
-----END PRIVATE KEY-----"""
      # Optional, for servers with `--auth-user-pass`:
      # username = "alice"
      # password = "hunter2"
      # Optional. Omit to let NCP negotiate; typical result is AES-256-GCM.
      # cipher  = "AES-256-GCM"          # or "CHACHA20-POLY1305"
      # tun_mtu = 1500
      # server_cn = "vpn.example.com"    # optional cert CommonName pin
