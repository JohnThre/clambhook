# clambhook configuration template
#
# This public template is intentionally non-operational. Keep real endpoints,
# credentials, keys, profile names, and deployment notes outside public source
# control.

active = "local"

[developer]
enabled = false
mitm_enabled = false
no_cache_enabled = false
capture_limit = 200
body_limit_bytes = 65536
header_value_limit_bytes = 8192
redact_headers = ["authorization", "proxy-authorization", "cookie", "set-cookie", "x-api-key", "api-key", "x-auth-token", "x-csrf-token", "x-xsrf-token", "csrf-token", "xsrf-token"]
redact_query_params = ["token", "access_token", "refresh_token", "id_token", "api_key", "apikey", "key", "secret", "password", "passwd", "code", "session", "auth"]

[traffic]
enabled = true
history_limit = 500
history_max_age = "168h"
# history_path may be set to an absolute local path. Empty uses the OS cache
# directory and stores metadata only: targets, decisions, timings, and bytes.

[[profile]]
name = "local"

  [profile.listen]
  socks5 = "127.0.0.1:1080"
  http = "127.0.0.1:8080"

  [profile.api]
  listen = "127.0.0.1:9090"

  [profile.dns]
  enabled = false
  timeout = "5s"
  # When enabled for TUN mode, TCP/UDP destination port 53 is answered locally
  # and forwarded to encrypted DoH/DoT/DoQ upstreams through the route planner.
  # When disabled, DNS packets route like normal traffic and can match rules.

  [[profile.chain]]
  name = "default"

    [[profile.chain.server]]
    name = "example"
    address = "example.invalid:443"
    protocol = "replace-with-private-profile"

      [profile.chain.server.settings]
      token = "replace-with-private-value"

  [[profile.chain]]
  name = "backup"

    [[profile.chain.server]]
    name = "backup-example"
    address = "backup.example.invalid:443"
    protocol = "replace-with-private-profile"

      [profile.chain.server.settings]
      token = "replace-with-private-value"

  [[profile.policy_group]]
  name = "auto"
  type = "url-test"
  chains = ["default", "backup"]
  test_url = "https://www.gstatic.com/generate_204"
  interval = "30s"
  timeout = "5s"
  # Rules can route through smart groups with action = "group:<name>".

  [[profile.policy_group]]
  name = "manual"
  type = "select"
  chains = ["default", "backup"]
  selected = "default"
  # Manual select groups persist their selected chain in this file and can be
  # changed through the API or UI.

  [[profile.rule_set]]
  name = "example-trackers"
  domain_suffixes = ["tracker.example.invalid"]
  cidrs = ["203.0.113.0/24"]
  disabled = false
  # Rule sets are reusable destination matchers. A set may also point at a
  # remote list with url/format; disabled remote sets keep inline entries only.

  [[profile.rule]]
  name = "example-blocklist"
  action = "block"
  domain_suffixes = ["tracker.example.invalid"]
  networks = ["tcp"]

  [[profile.rule]]
  name = "example-direct-lan"
  action = "direct"
  cidrs = ["192.168.0.0/16", "10.0.0.0/8"]

  [[profile.rule]]
  name = "example-auto"
  action = "group:auto"

  [[profile.rule]]
  name = "example-guest-trackers"
  action = "group:manual"
  rule_sets = ["example-trackers"]
  source_cidrs = ["10.10.0.0/16"]

  [[profile.rule_subscription]]
  name = "example-ads"
  url = "https://lists.example.invalid/ads.txt"
  format = "auto"
  action = "block"
  networks = ["tcp", "udp"]
  disabled = true
  # Refreshed subscription caches materialize as generated rules after manual
  # profile rules, so hand-written rules can override broad subscription lists.
