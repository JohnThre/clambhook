# clambhook configuration template
#
# This public template is intentionally non-operational. Keep real endpoints,
# credentials, keys, profile names, and deployment notes outside public source
# control.

active = "local"

[developer]
enabled = false
mitm_enabled = true
capture_limit = 200
body_limit_bytes = 65536
header_value_limit_bytes = 8192
redact_headers = ["authorization", "proxy-authorization", "cookie", "set-cookie"]

[[profile]]
name = "local"

  [profile.listen]
  socks5 = "127.0.0.1:1080"
  http = "127.0.0.1:8080"

  [profile.api]
  listen = "127.0.0.1:9090"

  [profile.dns]
  enabled = false
  timeout = "5s"

  [[profile.chain]]
  name = "default"

    [[profile.chain.server]]
    name = "example"
    address = "example.invalid:443"
    protocol = "replace-with-private-profile"

      [profile.chain.server.settings]
      token = "replace-with-private-value"

  [[profile.chain]]
  name = "backup"

    [[profile.chain.server]]
    name = "backup-example"
    address = "backup.example.invalid:443"
    protocol = "replace-with-private-profile"

      [profile.chain.server.settings]
      token = "replace-with-private-value"

  [[profile.policy_group]]
  name = "auto"
  type = "url-test"
  chains = ["default", "backup"]
  test_url = "https://www.gstatic.com/generate_204"
  interval = "30s"
  timeout = "5s"

  [[profile.rule]]
  name = "example-blocklist"
  action = "block"
  domain_suffixes = ["tracker.example.invalid"]
  networks = ["tcp"]

  [[profile.rule]]
  name = "example-direct-lan"
  action = "direct"
  cidrs = ["192.168.0.0/16", "10.0.0.0/8"]

  [[profile.rule]]
  name = "example-auto"
  action = "group:auto"

  [[profile.rule_subscription]]
  name = "example-ads"
  url = "https://lists.example.invalid/ads.txt"
  format = "auto"
  action = "block"
  networks = ["tcp", "udp"]
  disabled = true
