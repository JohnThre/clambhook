# Dedicated, unprivileged system user for clambhook-daemon.service.
#
# Installed to /usr/lib/sysusers.d/clambhook.conf by the .deb / .rpm packages
# and applied with systemd-sysusers at install time. The daemon runs as this
# user (see packaging/systemd/clambhook-daemon.service) with only the ambient
# CAP_NET_ADMIN/CAP_NET_RAW capabilities it needs for TUN routing.
#
# Type Name      ID GECOS               Home dir           Shell
u     clambhook  -  "ClambHook daemon"  /var/lib/clambhook -
