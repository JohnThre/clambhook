# Ownership/permissions for the clambhook-daemon runtime user's directories.
#
# Installed to /usr/lib/tmpfiles.d/clambhook.conf by the .deb / .rpm packages
# and applied with systemd-tmpfiles --create at install time. This makes the
# config and state directories owned by the dedicated `clambhook` user before
# the first service start; the unit's ConfigurationDirectory=/StateDirectory=
# keep them correct at runtime under ProtectSystem=strict.
#
#Type Path                Mode UID       GID       Age Argument
d     /etc/clambhook      0750 clambhook clambhook -
d     /var/lib/clambhook  0750 clambhook clambhook -
