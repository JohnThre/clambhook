# Non-Apple installer validation — GitHub CI/CD runs first for GNU/Linux
# and Android, before any manual QA or store upload. See
# docs/release-validation.md. Apple platforms (macOS/iOS/iPadOS/watchOS/
# visionOS) are validated on Xcode Cloud, not here.
#
# This workflow builds and smoke-tests installers only. It uploads no installer
# artifacts and creates no GitHub Release: distribution stays on the approved
# store channels (see docs/distribution.md).
name: Installer validation

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: installer-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-quality:
    name: Go unit, race, and lint checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install native and lint dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libsodium-dev
          go install honnef.co/go/tools/cmd/staticcheck@2025.1.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Go unit tests
        run: make test
      - name: Go race tests
        run: make test-race
      - name: Go lint
        run: make lint

  linux-unit:
    name: GNU/Linux Kotlin unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Linux Kotlin unit tests
        working-directory: ui/linux
        run: ./gradlew --no-daemon test

  linux:
    name: GNU/Linux package recipes (${{ matrix.distro }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # PureOS validates via the Debian path; Bazzite via the Fedora path +
        # Flatpak manifest (see packaging/README.md). The four matrix jobs cover
        # all six listed distributions without adding redundant container lanes.
        distro: [ubuntu, debian, fedora, rocky]
    steps:
      - uses: actions/checkout@v4
      - name: Build package recipes and run headless smoke in a ${{ matrix.distro }} container
        run: scripts/validate-linux-distros.sh ${{ matrix.distro }}

  portable-strict:
    name: Required Flatpak and AppImage builds
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install portable package build dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential pkg-config rsync libsodium-dev \
            flatpak flatpak-builder fuse3 libfuse2t64 kmod curl file
      - name: Require native namespace and FUSE support
        run: |
          test "$(cat /proc/sys/user/max_user_namespaces)" -gt 0
          sudo modprobe fuse
          test -c /dev/fuse
      - name: Verify strict portable recipe failure behavior
        run: scripts/test-ci-linux-portable-recipes.sh
      - name: Build Flatpak and AppImage recipes strictly
        run: scripts/ci-linux-portable-recipes.sh

  android:
    name: Android installer (.apk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install gomobile and gobind (embedded daemon AAR)
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Point gomobile at the runner NDK
        run: echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"
      - name: Unit tests + debug assemble + lint
        working-directory: ui/android
        run: ./gradlew --no-daemon :app:testDebugUnitTest :app:assembleDebug :app:lintDebug

