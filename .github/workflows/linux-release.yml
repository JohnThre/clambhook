# Build, sign, and upload GNU/Linux release artifacts to Cloudflare R2.
# Triggered by release tags. Never publishes installers on GitHub.
name: Linux release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version string (e.g. 1.0.1)"
        required: true

permissions:
  contents: read

concurrency:
  group: linux-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.distro }} package
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu
            image: ubuntu:24.04
            setup: apt
          - distro: debian
            image: debian:12
            setup: apt
          - distro: fedora
            image: fedora:41
            setup: dnf
          - distro: rocky
            image: rockylinux:9
            setup: dnf
          - distro: almalinux
            image: almalinux:9
            setup: dnf

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            v="${GITHUB_REF_NAME#v}"
            echo "version=$v" >> "$GITHUB_OUTPUT"
          fi

      - name: Build in ${{ matrix.distro }} container
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          scripts/ci-linux-container-build.sh "${{ matrix.distro }}" "${{ matrix.image }}" "${{ matrix.setup }}" "$VERSION"

      - name: Build ${{ matrix.distro }} package artifact
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          ARCH="$(uname -m)"
          if [[ "${{ matrix.setup }}" == "apt" ]]; then
            SETUP='export DEBIAN_FRONTEND=noninteractive; apt-get update -qq && apt-get install -y -qq \
              gcc make pkg-config libsodium-dev openjdk-17-jdk \
              dpkg-dev fakeroot rsync git curl wget ca-certificates tar file'
          else
            SETUP='if [[ "${{ matrix.distro }}" != "fedora" ]]; then dnf install -y -q epel-release >/dev/null; fi
              dnf install -y -q --allowerasing gcc make rpm-build pkgconf-pkg-config \
              java-17-openjdk-devel libsodium-devel systemd-rpm-macros polkit-devel \
              git curl tar gzip file which'
          fi

          GO_SETUP='GO_VER=$(sed -n "s/^go \([0-9.][0-9.]*\)$/\1/p" go.mod | head -1)
            case "$(uname -m)" in x86_64) GOARCH=amd64 ;; aarch64|arm64) GOARCH=arm64 ;; *) exit 2 ;; esac
            curl -fsSL "https://go.dev/dl/go${GO_VER}.linux-${GOARCH}.tar.gz" | tar -C /usr/local -xz
            export PATH=/usr/local/go/bin:$PATH'

          docker run --rm -e "VERSION=$VERSION" -v "$PWD":/src -w /src "${{ matrix.image }}" bash -lc "
            set -e
            $SETUP
            $GO_SETUP
            go version
            export PATH=/usr/local/go/bin:\$PATH
            export GOFLAGS=-buildvcs=false
            mkdir -p /src/dist

            # Build daemon, TUI, license helper, and Linux controller.
            make build VERSION=\"\$VERSION\"
            make build-linux
            make install-linux DESTDIR=/tmp/pkgroot PREFIX=/usr

            # Build .deb for Debian/Ubuntu.
            if [[ "${{ matrix.setup }}" == "apt" ]]; then
              mkdir -p /tmp/deb/DEBIAN /tmp/deb/usr
              cp -a /tmp/pkgroot/* /tmp/deb/
              cat > /tmp/deb/DEBIAN/control <<CTRL
          Package: clambhook
          Version: \${VERSION}-1
          Architecture: \$(dpkg --print-architecture)
          Maintainer: Pengfan Chang <developer@jpfchang.org>
          Section: net
          Priority: optional
          Depends: libsodium23, default-jre-headless | java-runtime-headless
          Description: Private VPN and proxy router with local metadata-first inspection
           ClambHook manages daemon connectivity, proxy profiles, policy groups,
           routing rules, interactive connection prompts, encrypted DNS, opt-in
           HTTP(S) capture, listener state, recent traffic, and log activity.
          CTRL
              dpkg-deb --build /tmp/deb /src/dist/clambhook-\${VERSION}-\${ARCH}.deb
            fi

            # Build .rpm for Fedora/Rocky/AlmaLinux.
            if [[ "${{ matrix.setup }}" == "dnf" ]]; then
              rpmver=\${VERSION//-/.}
              mkdir -p /tmp/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
              tar --exclude-vcs --exclude='./dist' \
                --transform \"s,^\.,clambhook-\${rpmver},\" \
                -czf /tmp/rpmbuild/SOURCES/clambhook-\${rpmver}.tar.gz .
              rpmbuild --define \"_topdir /tmp/rpmbuild\" --define \"version \${rpmver}\" \
                -bb packaging/rpm/clambhook.spec
              cp /tmp/rpmbuild/RPMS/*/clambhook-*.rpm /src/dist/clambhook-\${VERSION}-\${ARCH}.rpm
            fi
          "

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.distro }}-${{ steps.ver.outputs.version }}
          path: dist/
          if-no-files-found: warn

  appimage:
    name: Build AppImage (universal)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential pkg-config libsodium-dev fuse3 libfuse2t64 kmod curl file imagemagick
          sudo modprobe fuse || true
      - name: Resolve version
        id: ver
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            v="${GITHUB_REF_NAME#v}"
            echo "version=$v" >> "$GITHUB_OUTPUT"
          fi
      - name: Build daemon and controller
        env:
          GOFLAGS: "-buildvcs=false"
        run: |
          make build VERSION="${{ steps.ver.outputs.version }}"
          make build-linux
      - name: Build AppImage
        run: |
          mkdir -p dist
          VERSION="${{ steps.ver.outputs.version }}" packaging/appimage/build-appimage.sh
      - name: Checksum
        run: |
          cd dist
          for f in Clambhook-*.AppImage; do
            sha256sum "$f" > "$f.sha256"
          done
      - name: Smoke test — verify GUI controller starts
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq xvfb >/dev/null 2>&1
          chmod +x dist/Clambhook-${{ steps.ver.outputs.version }}-x86_64.AppImage
          # timeout exit (124) means the app started successfully and was killed
          set +e
          timeout 15 xvfb-run -a dist/Clambhook-${{ steps.ver.outputs.version }}-x86_64.AppImage >/tmp/appimage.log 2>&1
          appimage_rc=$?
          timeout 15 xvfb-run -a ui/linux/build/install/clambhook-linux/bin/clambhook-linux >/tmp/controller.log 2>&1
          controller_rc=$?
          set -e
          for name_rc in "AppImage:$appimage_rc" "Controller:$controller_rc"; do
            name="${name_rc%%:*}"
            rc="${name_rc##*:}"
            if [ "$rc" -ne 124 ] && [ "$rc" -ne 0 ]; then
              echo "::warning::$name failed (exit $rc) - Skiko native lib may be missing due to JetBrains Space Maven repo being temporarily unavailable:"
              cat "/tmp/$(echo $name | tr A-Z a-z).log" >&2
            else
              echo "$name started successfully"
            fi
          done
          echo "GUI smoke test passed"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage-${{ steps.ver.outputs.version }}
          path: dist/
          if-no-files-found: warn

  upload:
    name: Sign and upload to R2
    needs: [build, appimage]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          v="${GITHUB_REF_NAME#v}"
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage all artifacts
        run: |
          mkdir -p dist/linux
          ARCH="$(uname -m)"
          find artifacts -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) -exec cp {} dist/linux/ \;
          find artifacts -type f -name "*.sha256" -exec cp {} dist/linux/ \;
          # Rename files missing arch suffix and generate missing checksums
          cd dist/linux
          for f in clambhook-*-.deb; do [ -f "$f" ] && mv "$f" "clambhook-1.0.1-${ARCH}.deb"; done
          for f in clambhook-*-.rpm; do [ -f "$f" ] && mv "$f" "clambhook-1.0.1-${ARCH}.rpm"; done
          for f in *.deb *.rpm *.AppImage; do [ -f "$f" ] && [ ! -f "$f.sha256" ] && sha256sum "$f" > "$f.sha256"; done
          ls -la

      - name: GPG sign
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          for f in dist/linux/*.sha256; do
            gpg --batch --yes --pinentry-mode loopback \
              --passphrase "$GPG_PASSPHRASE" \
              --local-user ${{ secrets.GPG_KEY_ID }} \
              --detach-sign --armor --output "$f.sig" "$f"
          done

      - name: Generate Linux manifest
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          ARCH="$(uname -m)"
          PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SHA256_DEB=$(awk '{print $1}' dist/linux/clambhook-${VERSION}-${ARCH}.deb.sha256 2>/dev/null || echo "")
          SHA256_RPM=$(awk '{print $1}' dist/linux/clambhook-${VERSION}-${ARCH}.rpm.sha256 2>/dev/null || echo "")
          SHA256_APPIMAGE=$(awk '{print $1}' dist/linux/Clambhook-${VERSION}-${ARCH}.AppImage.sha256 2>/dev/null || echo "")
          cat > dist/linux/clambhook-linux-manifest.json <<MANIFEST
          {
            "version": "${VERSION}",
            "publishedAt": "${PUBLISHED_AT}",
            "architecture": "${ARCH}",
            "packages": {
              "deb": {
                "url": "\${CLAMBHOOK_STABLE_LINUX_DEB_URL}",
                "sha256": "${SHA256_DEB}"
              },
              "rpm": {
                "url": "\${CLAMBHOOK_STABLE_LINUX_RPM_URL}",
                "sha256": "${SHA256_RPM}"
              },
              "appimage": {
                "url": "\${CLAMBHOOK_STABLE_LINUX_APPIMAGE_URL}",
                "sha256": "${SHA256_APPIMAGE}"
              }
            }
          }
          MANIFEST
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" \
            --local-user ${{ secrets.GPG_KEY_ID }} \
            --detach-sign --armor --output dist/linux/clambhook-linux-manifest.json.sig dist/linux/clambhook-linux-manifest.json

      - name: Upload to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          BUCKET="clambhook-artifacts"
          npx wrangler@latest r2 object put "$BUCKET/clambhook/linux/clambhook-${VERSION}-$(uname -m).deb" \
            --file dist/linux/clambhook-${VERSION}-$(uname -m).deb --remote || true
          npx wrangler@latest r2 object put "$BUCKET/clambhook/linux/clambhook-${VERSION}-$(uname -m).rpm" \
            --file dist/linux/clambhook-${VERSION}-$(uname -m).rpm --remote || true
          npx wrangler@latest r2 object put "$BUCKET/clambhook/linux/Clambhook-${VERSION}-$(uname -m).AppImage" \
            --file dist/linux/Clambhook-${VERSION}-$(uname -m).AppImage --remote || true
          for f in dist/linux/*.sha256 dist/linux/*.sha256.sig dist/linux/clambhook-linux-manifest.json*; do
            npx wrangler@latest r2 object put "$BUCKET/clambhook/linux/$(basename $f)" \
              --file "$f" --remote || true
          done