# Real proxy protocol and privileged TUN coverage is intentionally
# scheduled/manual rather than running on every source change.
name: Protocol end-to-end

on:
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: protocol-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  protocol-e2e:
    name: sing-box, Tor, ClambBack, and optional OpenVPN
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CLAMBHOOK_E2E_BACKEND: docker
      CLAMBHOOK_E2E_OPENVPN_REMOTE: ${{ vars.CLAMBHOOK_E2E_OPENVPN_REMOTE }}
      CLAMBHOOK_E2E_OPENVPN_TCP_TARGET: ${{ vars.CLAMBHOOK_E2E_OPENVPN_TCP_TARGET }}
      CLAMBHOOK_E2E_OPENVPN_UDP_TARGET: ${{ vars.CLAMBHOOK_E2E_OPENVPN_UDP_TARGET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install native protocol dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config libsodium-dev tor curl \
            libboost-system-dev libboost-program-options-dev libssl-dev
      - name: Configure optional OpenVPN credentials
        env:
          OPENVPN_CA: ${{ secrets.CLAMBHOOK_E2E_OPENVPN_CA }}
          OPENVPN_CLIENT_CERT: ${{ secrets.CLAMBHOOK_E2E_OPENVPN_CLIENT_CERT }}
          OPENVPN_CLIENT_KEY: ${{ secrets.CLAMBHOOK_E2E_OPENVPN_CLIENT_KEY }}
        run: |
          if [[ -n "$OPENVPN_CA" && -n "$OPENVPN_CLIENT_CERT" && -n "$OPENVPN_CLIENT_KEY" ]]; then
            umask 077
            printf '%s\n' "$OPENVPN_CA" > "$RUNNER_TEMP/openvpn-ca.pem"
            printf '%s\n' "$OPENVPN_CLIENT_CERT" > "$RUNNER_TEMP/openvpn-client-cert.pem"
            printf '%s\n' "$OPENVPN_CLIENT_KEY" > "$RUNNER_TEMP/openvpn-client-key.pem"
            echo "CLAMBHOOK_E2E_OPENVPN_CA=$RUNNER_TEMP/openvpn-ca.pem" >> "$GITHUB_ENV"
            echo "CLAMBHOOK_E2E_OPENVPN_CLIENT_CERT=$RUNNER_TEMP/openvpn-client-cert.pem" >> "$GITHUB_ENV"
            echo "CLAMBHOOK_E2E_OPENVPN_CLIENT_KEY=$RUNNER_TEMP/openvpn-client-key.pem" >> "$GITHUB_ENV"
          else
            echo "OpenVPN credentials are not configured; external OpenVPN coverage remains optional in this scheduled suite."
          fi
      - name: Run required real-server protocol suite
        run: make e2e-required

  tun-e2e:
    name: Privileged Linux TUN packet round-trip
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install TUN harness dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config libsodium-dev curl iproute2 python3 \
            libboost-system-dev libboost-program-options-dev libssl-dev
          test -c /dev/net/tun
      - name: Start daemon in TUN mode and verify packet round-trip
        run: make e2e-tun
