name: App Review Compliance

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  app-review-compliance:
    name: App Review Compliance
    runs-on: macos-26
    env:
      CLAMBHOOK_APP_REVIEW_DEMO_PASSWORD: ${{ secrets.CLAMBHOOK_APP_REVIEW_DEMO_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install system dependencies
        run: brew install libsodium pkg-config

      - name: Require demo profile secret
        run: |
          if [ -z "$CLAMBHOOK_APP_REVIEW_DEMO_PASSWORD" ]; then
            echo "::error::Configure the CLAMBHOOK_APP_REVIEW_DEMO_PASSWORD repository secret before App Review validation."
            exit 1
          fi

      - name: Validate App Review demo profile
        run: make app-review-release-check
